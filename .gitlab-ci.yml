# G10-码到成功队 - 时光胶囊项目

stages:
  - deploy # 部署（可选）

.default_before_script: &default_before_script
  - python --version
  - conda --version
  - conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/main/
  - conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/pkgs/free/
  - conda config --add channels https://mirrors.tuna.tsinghua.edu.cn/anaconda/cloud/conda-forge/
  - conda config --set show_channel_urls yes
  - conda config --set channel_priority flexible
  - conda clean --all
  - python -m pip install -U pip -i https://pypi.tuna.tsinghua.edu.cn/simple --default-timeout=100

# 全局变量
variables:
  PYTHON_VERSION: "3.11"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  CONDA_ENV_NAME: "timecapsule"

# 缓存
cache:
  paths:
    - .cache/pip
    - backend/.pytest_cache
    - frontend/node_modules
    - frontend/.npm/

# ============================================
# 部署 (Deploy)
# ============================================

.deploy_base: &deploy_base
  stage: deploy
  image:
    name: alpine
    pull_policy: if-not-present
  before_script:
    - echo "Using Tsinghua Alpine mirror..."
    - sed -i 's#https://dl-cdn.alpinelinux.org/alpine#https://mirrors.tuna.tsinghua.edu.cn/alpine#g' /etc/apk/repositories
    - apk update
    - echo "All dependencies installed successfully!"
    - apk add --no-cache openssh-client sshpass git curl
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # 写入私钥（需在 CI/CD 变量中配置 SSH_PRIVATE_KEY、DEPLOY_SERVER、DEPLOY_USER、PROJECT_PATH）
    - |
      sshpass -p "$DEPLOY_PASSWORD" ssh \
        -o StrictHostKeyChecking=no \
        -o ConnectTimeout=5 \
        $DEPLOY_USER@$DEPLOY_SERVER "
      echo 'Connection OK'"
    - ssh-keyscan -H "$DEPLOY_SERVER" >> ~/.ssh/known_hosts
    - git config --global user.name "GitLab CI"
    - git config --global user.email "ci@timecapsule.local"
  rules:
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "develop"


# ============================================
# 生产部署：构建并运行后端 Docker 容器
# ============================================
deploy:production:
  <<: *deploy_base
  script:
    - echo "🚀 Start production deploy..."
    - |
      sshpass -p "$DEPLOY_PASSWORD" ssh \
      -o StrictHostKeyChecking=no \
      -o ConnectTimeout=5 \
      $DEPLOY_USER@$DEPLOY_SERVER "CI_COMMIT_SHORT_SHA='$CI_COMMIT_SHORT_SHA' CI_COMMIT_REF_NAME='$CI_COMMIT_REF_NAME' PROJECT_PATH='$PROJECT_PATH' bash -s" <<'REMOTE_SCRIPT'
      set -e
      echo '=== 🧱 部署开始 ==='
      mkdir -p $PROJECT_PATH
      cd $PROJECT_PATH

      # --------------------------
      # Git 同步项目代码
      # --------------------------
      if [ ! -d .git ]; then
        echo '首次部署：正在 clone 仓库...'
        git clone git@gitlab.com:tj-cs-swe/CS10102302-2025/group15/timecapsule.git .
      fi

      git config --global --add safe.directory $PROJECT_PATH
      git remote set-url origin git@gitlab.com:tj-cs-swe/CS10102302-2025/group15/timecapsule.git
      git fetch origin
      git checkout -f $CI_COMMIT_REF_NAME
      git reset --hard origin/$CI_COMMIT_REF_NAME

      echo '=== ✅ 代码同步完成 ==='

      # --------------------------
      # 构建后端 Docker 镜像
      # --------------------------
      echo '=== 🐳 开始构建后端 Docker 镜像 ==='
      cd $PROJECT_PATH/backend

      # 生成 Dockerfile（如果项目未包含）
      echo '生成最新 backend Dockerfile中...'
      echo 'FROM python:3.11' > Dockerfile
      echo 'WORKDIR /app' >> Dockerfile
      echo 'COPY . /app' >> Dockerfile
      # 使用清华源加速安装
      echo 'RUN pip install -i https://pypi.tuna.tsinghua.edu.cn/simple -r requirements.txt' >> Dockerfile 
      echo 'EXPOSE 8000' >> Dockerfile
      echo 'CMD ["python", "app/main.py"]' >> Dockerfile

      docker build -t timecapsule-backend:$CI_COMMIT_SHORT_SHA .

      # --------------------------
      # 构建前端 Docker 镜像
      # --------------------------
      echo '=== 🐳 构建前端 Docker 镜像 ==='
      cd $PROJECT_PATH/frontend

      # ==========================
      # Stage 1: Build Vue app
      # ==========================
      echo 'FROM node:20-bullseye AS build' > Dockerfile
      echo 'WORKDIR /app' >> Dockerfile
      echo 'COPY package*.json ./' >> Dockerfile
      echo 'RUN npm ci --prefer-offline' >> Dockerfile
      echo 'COPY . .' >> Dockerfile
      echo 'RUN npm run build' >> Dockerfile

      # ==========================
      # Stage 2: Serve with Nginx
      # ==========================
      echo 'FROM nginx:alpine' >> Dockerfile

      # 清理原始静态文件
      echo 'RUN rm -rf /usr/share/nginx/html/*' >> Dockerfile
      # 拷贝前端构建结果
      echo 'COPY --from=build /app/dist /usr/share/nginx/html' >> Dockerfile
      echo 'EXPOSE 80' >> Dockerfile
      echo 'CMD ["nginx", "-g", "daemon off;"]' >> Dockerfile
      
      mkdir -p ./nginx_conf
      echo 'server {' > ./nginx_conf/default.conf
      echo '    listen 80;' >> ./nginx_conf/default.conf
      echo '    server_name _;' >> ./nginx_conf/default.conf
      echo '    location /api {' >> ./nginx_conf/default.conf
      echo '        proxy_pass timecapsule-backend:8000;' >> ./nginx_conf/default.conf
      echo '        proxy_set_header Host \$host;' >> ./nginx_conf/default.conf
      echo '        proxy_set_header X-Real-IP \$remote_addr;' >> ./nginx_conf/default.conf
      echo '    }' >> ./nginx_conf/default.conf
      echo '    location / {' >> ./nginx_conf/default.conf
      echo '        root /usr/share/nginx/html;' >> ./nginx_conf/default.conf
      echo '        index index.html;' >> ./nginx_conf/default.conf
      echo '        try_files \$uri \$uri/ /index.html;' >> ./nginx_conf/default.conf
      echo '    }' >> ./nginx_conf/default.conf
      echo '    access_log /dev/stdout;' >> ./nginx_conf/default.conf
      echo '    error_log /dev/stderr;' >> ./nginx_conf/default.conf
      echo '}' >> ./nginx_conf/default.conf

      # 修改 Dockerfile 复制配置
      echo 'COPY nginx_conf/default.conf /etc/nginx/conf.d/default.conf' >> Dockerfile

      docker build -t timecapsule-frontend:$CI_COMMIT_SHORT_SHA .

      # --------------------------
      # 运行 Docker 容器
      # --------------------------

      echo "=== 建立局域网 ==="
      docker network create timecapsule-net || true

      echo '=== 🧩 启动后端容器 ==='      
      BACKEND_CONTAINER=$(docker ps -a -q -f name=timecapsule-backend)
      echo "当前容器ID: $BACKEND_CONTAINER"
      echo "调试 - 变量长度: ${#FRONTEND_CONTAINER}"
      echo "调试 - 变量内容: |$FRONTEND_CONTAINER|"
      echo "调试 - 命令退出码: $?"

      if [ -n "$BACKEND_CONTAINER" ]; then
        echo 'timecapsule-backend exist, stop remove and restart'
        sudo docker stop timecapsule-backend
        sudo docker rm -f timecapsule-backend
      else
        echo "调试 - IF-frontend条件不成立"
      fi

      # remove forcely
      docker rm -f timecapsule-backend 2>/dev/null || true

      docker run -d \
        --name timecapsule-backend \
        -p 8000:8000 \
        --network timecapsule-net \
        timecapsule-backend:$CI_COMMIT_SHORT_SHA
        
      echo '=== 🧩 启动前端容器 ==='
      FRONTEND_CONTAINER=$(docker ps -a -q -f name=timecapsule-frontend)
      echo "当前容器ID: $FRONTEND_CONTAINER"
      echo "调试 - 变量长度: ${#FRONTEND_CONTAINER}"
      echo "调试 - 变量内容: |$FRONTEND_CONTAINER|"
      echo "调试 - 命令退出码: $?"

      if [ -n "$FRONTEND_CONTAINER" ]; then
        echo 'timecapsule-frontend exist, stop remove and restart'
        sudo docker stop timecapsule-frontend
        sudo docker rm -f timecapsule-frontend
      else
        echo "调试 - IF-backend条件不成立"
      fi

      # remove forcely
      docker rm -f timecapsule-frontend 2>/dev/null || true

      docker run -d \
        --name timecapsule-frontend \
        -p 80:80 \
        --network timecapsule-net \
        timecapsule-frontend:$CI_COMMIT_SHORT_SHA

      echo '=== ✅ 部署完成 ==='
      docker ps -a | grep timecapsule-backend
      docker ps -a | grep timecapsule-frontend
      REMOTE_SCRIPT

  environment:
    name: production
    url: http://$DEPLOY_SERVER
  when: manual
