# GitLab CI/CD Pipeline for TimeCapsule Project
# G10-码到成功队 - 时光胶囊项目

# 定义流水线阶段
stages:
  - lint          # 代码质量检查
  - test          # 单元测试
  - security      # 安全扫描
  - build         # 构建验证
  - deploy        # 部署（可选）

# 全局变量配置
variables:
  PYTHON_VERSION: "3.13"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  CONDA_ENV_NAME: "timecapsule"

# 缓存配置 - 加速构建
cache:
  paths:
    - .cache/pip
    - .pytest_cache

# ============================================
# 第一阶段：代码质量检查 (Lint)
# ============================================

lint:python:
  stage: lint
  image: python:3.13-slim
  before_script:
    - pip install flake8 pylint black isort
  script:
    # Python 代码风格检查
    - echo "🔍 Running flake8 for code style check..."
    - flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
    - flake8 app/ --count --max-complexity=10 --max-line-length=127 --statistics || true

    # 检查代码格式
    - echo "🔍 Checking code formatting with black..."
    - black --check app/ || true

    # 检查 import 排序
    - echo "🔍 Checking import ordering with isort..."
    - isort --check-only app/ || true
  allow_failure: true  # 暂时允许失败，不阻塞流水线
  rules:
    # 主分支和 MR 运行完整检查
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
  tags:
    - docker

# ============================================
# 第二阶段：单元测试 (Test)
# ============================================

test:unit:
  stage: test
  image: continuumio/miniconda3:latest
  before_script:
    # 安装项目依赖
    - echo "📦 Setting up conda environment..."
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
    - conda list
  script:
    # 运行单元测试
    - echo "🧪 Running unit tests..."
    - pytest tests/ -v --tb=short --color=yes

    # 生成测试覆盖率报告
    - echo "📊 Generating test coverage report..."
    - pip install pytest-cov
    - pytest tests/ --cov=app --cov-report=term --cov-report=html
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  tags:
    - docker

# 其他分支的简化测试 - 只运行基本测试，不生成覆盖率报告
test:quick:
  stage: test
  image: continuumio/miniconda3:latest
  before_script:
    - echo "📦 Setting up conda environment..."
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
  script:
    - echo "🧪 Running quick tests for feature branch..."
    - pytest tests/ -v --tb=short --color=yes
  rules:
    # 仅在非主分支且非 MR 时运行
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "develop" && $CI_MERGE_REQUEST_IID == null
  tags:
    - docker

test:api:
  stage: test
  image: continuumio/miniconda3:latest
  before_script:
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
  script:
    # API 启动测试
    - echo "🚀 Testing API startup..."
    - timeout 10 python app/main.py &
    - sleep 5
    - echo "✅ API startup test passed"
  allow_failure: true
  tags:
    - docker

# ============================================
# 第三阶段：安全扫描 (Security)
# ============================================

security:secret-detection:
  stage: security
  image: python:3.13-slim
  script:
    - echo "🔐 Running secret detection..."
    - pip install detect-secrets
    - detect-secrets scan --baseline .secrets.baseline || true
  allow_failure: true
  rules:
    # 仅在主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
  tags:
    - docker

security:dependency-check:
  stage: security
  image: python:3.13-slim
  before_script:
    - pip install safety
  script:
    - echo "🛡️ Checking for vulnerable dependencies..."
    - pip freeze | safety check --json || true
  allow_failure: true
  rules:
    # 仅在主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
  tags:
    - docker

security:sast:
  stage: security
  image: python:3.13-slim
  before_script:
    - pip install bandit
  script:
    - echo "🔒 Running SAST security analysis..."
    - bandit -r app/ -f json -o bandit-report.json || true
    - bandit -r app/ -f txt || true
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 1 week
  allow_failure: true
  rules:
    # 仅在主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
  tags:
    - docker

# ============================================
# 第四阶段：构建验证 (Build)
# ============================================

build:validate:
  stage: build
  image: continuumio/miniconda3:latest
  before_script:
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
  script:
    # 验证项目能否正常构建
    - echo "🏗️ Validating project build..."
    - python -m py_compile app/main.py
    - python -m py_compile app/**/*.py || true
    - echo "✅ Build validation passed"
  tags:
    - docker

build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    # 构建 Docker 镜像（如果需要）
    - echo "🐳 Building Docker image..."
    - |
      cat > Dockerfile <<EOF
      FROM continuumio/miniconda3:latest
      WORKDIR /app
      COPY environment.yml .
      RUN conda env create -f environment.yml -n timecapsule
      SHELL ["conda", "run", "-n", "timecapsule", "/bin/bash", "-c"]
      COPY app/ ./app/
      EXPOSE 8000
      CMD ["conda", "run", "-n", "timecapsule", "python", "app/main.py"]
      EOF
    - docker build -t timecapsule:$CI_COMMIT_SHORT_SHA .
    - echo "✅ Docker image built successfully"
  only:
    - main
    - master
    - develop
  tags:
    - docker
  allow_failure: true

# ============================================
# 第五阶段：部署 (Deploy)
# ============================================

deploy:staging:
  stage: deploy
  image: continuumio/miniconda3:latest
  script:
    - echo "🚀 Deploying to staging environment..."
    - echo "⚠️  Deployment configuration needed"
    - echo "✅ Staging deployment completed"
  environment:
    name: staging
    url: https://staging.timecapsule.example.com
  only:
    - develop
  when: manual  # 手动触发
  tags:
    - docker

deploy:production:
  stage: deploy
  image: continuumio/miniconda3:latest
  script:
    - echo "🚀 Deploying to production environment..."
    - echo "⚠️  Production deployment configuration needed"
    - echo "✅ Production deployment completed"
  environment:
    name: production
    url: https://timecapsule.example.com
  only:
    - main
    - master
  when: manual  # 手动触发，需要批准
  tags:
    - docker

# ============================================
# 其他配置
# ============================================

# Pipeline 触发规则
workflow:
  rules:
    # 主分支：运行完整 Pipeline
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
      when: always
    # Merge Request：运行完整 Pipeline
    - if: $CI_MERGE_REQUEST_IID
      when: always
    # Git Tag：运行完整 Pipeline
    - if: $CI_COMMIT_TAG
      when: always
    # 其他分支：运行简化 Pipeline（只有 test:quick）
    - if: $CI_COMMIT_BRANCH
      when: always

# 流水线成功/失败通知
# 可以配置邮件或其他通知方式
