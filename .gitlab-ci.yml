# GitLab CI/CD Pipeline for TimeCapsule Project
# G10-码到成功队 - 时光胶囊项目

# 定义流水线阶段
stages:
  - lint          # 代码质量检查
  - test          # 单元测试
  - security      # 安全扫描
  - build         # 构建验证
  - deploy        # 部署（可选）

# 全局变量配置
variables:
  PYTHON_VERSION: "3.13"
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  CONDA_ENV_NAME: "timecapsule"

# 缓存配置 - 加速构建
cache:
  paths:
    - .cache/pip
    - .pytest_cache

# ============================================
# 第一阶段：代码质量检查 (Lint)
# ============================================

lint:python:
  stage: lint
  image: python:3.13-slim
  before_script:
    - pip install flake8 pylint black isort
  script:
    # Python 代码风格检查
    - echo "🔍 Running flake8 for code style check..."
    - flake8 app/ --count --select=E9,F63,F7,F82 --show-source --statistics || true
    - flake8 app/ --count --max-complexity=10 --max-line-length=127 --statistics || true

    # 检查代码格式
    - echo "🔍 Checking code formatting with black..."
    - black --check app/ || true

    # 检查 import 排序
    - echo "🔍 Checking import ordering with isort..."
    - isort --check-only app/ || true
  allow_failure: true  # 暂时允许失败，不阻塞流水线
  rules:
    # 主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
    # 功能分支（setup/feature 开头）也运行
    - if: $CI_COMMIT_BRANCH =~ /^(setup|feature)-.*/

# ============================================
# 第二阶段：单元测试 (Test)
# ============================================

test:unit:
  stage: test
  image: continuumio/miniconda3:latest
  before_script:
    # 安装项目依赖
    - echo "📦 Setting up conda environment..."
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
    - conda list
  script:
    # 运行单元测试
    - echo "🧪 Running unit tests..."
    - pytest tests/ -v --tb=short --color=yes

    # 生成测试覆盖率报告
    - echo "📊 Generating test coverage report..."
    - pip install pytest-cov
    - pytest tests/ --cov=app --cov-report=term --cov-report=html
  coverage: '/(?i)total.*? (100(?:\.0+)?\%|[1-9]?\d(?:\.\d+)?\%)$/'
  artifacts:
    when: always
    paths:
      - htmlcov/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage.xml
    expire_in: 1 week
  rules:
    # 仅在主分支和 MR 运行完整测试
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID

# 其他分支的简化测试 - 只运行基本测试，不生成覆盖率报告
test:quick:
  stage: test
  image: continuumio/miniconda3:latest
  before_script:
    - echo "📦 Setting up conda environment..."
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
  script:
    - echo "🧪 Running quick tests for feature branch..."
    - pytest tests/ -v --tb=short --color=yes
  rules:
    # 仅在非主分支且非 MR 时运行
    - if: $CI_COMMIT_BRANCH != "main" && $CI_COMMIT_BRANCH != "master" && $CI_COMMIT_BRANCH != "develop" && $CI_MERGE_REQUEST_IID == null

test:api:
  stage: test
  image: continuumio/miniconda3:latest
  before_script:
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
  script:
    # API 启动测试
    - echo "🚀 Testing API startup..."
    - timeout 10 python app/main.py &
    - sleep 5
    - echo "✅ API startup test passed"
  allow_failure: true
  rules:
    # 主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
    # 功能分支（setup/feature 开头）也运行
    - if: $CI_COMMIT_BRANCH =~ /^(setup|feature)-.*/

# ============================================
# 第三阶段：安全扫描 (Security)
# ============================================

security:secret-detection:
  stage: security
  image: python:3.13-slim
  script:
    - echo "🔐 Running secret detection..."
    - pip install detect-secrets
    - detect-secrets scan --baseline .secrets.baseline || true
  allow_failure: true
  rules:
    # 主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
    # 功能分支（setup/feature 开头）也运行
    - if: $CI_COMMIT_BRANCH =~ /^(setup|feature)-.*/

security:dependency-check:
  stage: security
  image: python:3.13-slim
  before_script:
    - pip install safety
  script:
    - echo "🛡️ Checking for vulnerable dependencies..."
    - pip freeze | safety check --json || true
  allow_failure: true
  rules:
    # 主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
    # 功能分支（setup/feature 开头）也运行
    - if: $CI_COMMIT_BRANCH =~ /^(setup|feature)-.*/

security:sast:
  stage: security
  image: python:3.13-slim
  before_script:
    - pip install bandit
  script:
    - echo "🔒 Running SAST security analysis..."
    - bandit -r app/ -f json -o bandit-report.json || true
    - bandit -r app/ -f txt || true
  artifacts:
    when: always
    paths:
      - bandit-report.json
    expire_in: 1 week
  allow_failure: true
  rules:
    # 主分支和 MR 运行
    - if: $CI_COMMIT_BRANCH == "main" || $CI_COMMIT_BRANCH == "master" || $CI_COMMIT_BRANCH == "develop"
    - if: $CI_MERGE_REQUEST_IID
    # 功能分支（setup/feature 开头）也运行
    - if: $CI_COMMIT_BRANCH =~ /^(setup|feature)-.*/

# ============================================
# 第四阶段：构建验证 (Build)
# ============================================

build:validate:
  stage: build
  image: continuumio/miniconda3:latest
  before_script:
    - conda env create -f environment.yml -n $CONDA_ENV_NAME || conda env update -f environment.yml -n $CONDA_ENV_NAME
    - source activate $CONDA_ENV_NAME
  script:
    # 验证项目能否正常构建
    - echo "🏗️ Validating project build..."
    - python -m py_compile app/main.py
    - python -m py_compile app/**/*.py || true
    - echo "✅ Build validation passed"

build:docker:
  stage: build
  image: docker:latest
  services:
    - docker:dind
  script:
    # 构建 Docker 镜像（如果需要）
    - echo "🐳 Building Docker image..."
    - |
      cat > Dockerfile <<EOF
      FROM continuumio/miniconda3:latest
      WORKDIR /app
      COPY environment.yml .
      RUN conda env create -f environment.yml -n timecapsule
      SHELL ["conda", "run", "-n", "timecapsule", "/bin/bash", "-c"]
      COPY app/ ./app/
      EXPOSE 8000
      CMD ["conda", "run", "-n", "timecapsule", "python", "app/main.py"]
      EOF
    - docker build -t timecapsule:$CI_COMMIT_SHORT_SHA .
    - echo "✅ Docker image built successfully"
  only:
    - main
    - master
    - develop
  allow_failure: true

# ============================================
# 第五阶段：部署 (Deploy) - 实际部署配置
# ============================================

# ============================================
# 修复版部署配置 - 使用更健壮的SSH处理方法
# ============================================

.deploy_base: &deploy_base
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client curl
    - mkdir -p ~/.ssh
    - chmod 700 ~/.ssh
    # 使用更安全的方法写入私钥
    - |
      {
        echo "-----BEGIN OPENSSH PRIVATE KEY-----"
        echo "$SSH_PRIVATE_KEY" | grep -v "PRIVATE KEY"
        echo "-----END OPENSSH PRIVATE KEY-----"
      } > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan -H "$DEPLOY_SERVER" >> ~/.ssh/known_hosts
    # 验证密钥
    - echo "验证SSH密钥..."
    - ls -la ~/.ssh/
    - head -2 ~/.ssh/id_rsa
    - echo "..."
    - tail -2 ~/.ssh/id_rsa
  only:
    - main
    - develop

# 基础连接测试
deploy:connection-test:
  <<: *deploy_base
  script:
    - echo "🔗 测试基础连接..."
    - timeout 10s ssh -o ConnectTimeout=5 -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_SERVER "echo '✅ 基础连接成功'"
  allow_failure: false

# 完整环境测试
deploy:test:
  <<: *deploy_base
  script:
    - echo "🧪 测试完整环境..."
    - |
      ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_SERVER "
        echo '=== 环境测试 ==='
        echo '用户: $(whoami)'
        echo '主机: $(hostname)'
        echo '时间: $(date)'
        echo '目录:'
        pwd
        ls -la /home/TimeCapsule/
        echo '权限测试:'
        sudo systemctl status nginx --no-pager -l | head -3 && echo '✅ Nginx权限正常'
        echo '✅ 环境测试通过'
      "
  allow_failure: false

# 实际部署
deploy:production:
  <<: *deploy_base
  script:
    - echo "🚀 开始部署..."
    - |
      ssh -o StrictHostKeyChecking=no $DEPLOY_USER@$DEPLOY_SERVER "
        set -e
        echo '=== 部署开始 ==='
        
        # 切换到项目目录
        cd $PROJECT_PATH
        
        # 如果目录为空，初始化git
        if [ ! -d .git ]; then
          echo '初始化Git仓库...'
          git init
          git remote add origin $CI_REPOSITORY_URL
        fi
        
        # 拉取代码
        echo '拉取最新代码...'
        git fetch origin
        git checkout $CI_COMMIT_REF_NAME
        git reset --hard origin/$CI_COMMIT_REF_NAME
        
        # 设置权限
        echo '设置权限...'
        sudo chown -R www-data:mujica $PROJECT_PATH
        sudo find $PROJECT_PATH -type d -exec chmod 775 {} \\;
        sudo find $PROJECT_PATH -type f -exec chmod 664 {} \\;
        
        # 重启服务
        echo '重启服务...'
        sudo systemctl reload nginx
        
        echo '✅ 部署完成!'
        echo '访问: http://$DEPLOY_SERVER'
      "
  environment:
    name: production
    url: http://$DEPLOY_SERVER
  when: manual