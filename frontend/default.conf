server {
	listen 80;
	server_name _;
	location /api/ {
	    proxy_pass http://timecapsule_backend:8000/api/;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	}
	location /docs {
	    proxy_pass http://timecapsule_backend:8000/docs;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	}
	location /health {
	    proxy_pass http://timecapsule_backend:8000/health;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	}
	location /openapi.json {
	    proxy_pass http://timecapsule_backend:8000/openapi.json;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	}
	location /redoc {
	    proxy_pass http://timecapsule_backend:8000/redoc;
	    proxy_set_header Host $host;
	    proxy_set_header X-Real-IP $remote_addr;
	}
	location / {
	    root /usr/share/nginx/html;
	    index index.html;
	    try_files $uri $uri/ /index.html;
	}
	access_log /dev/stdout;
	error_log /dev/stderr;
}
