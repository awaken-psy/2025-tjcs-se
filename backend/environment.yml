name: timecapsule
channels:
  - conda-forge
  - defaults
dependencies:
  # Python版本
  - python=3.11

  # 核心Web框架
  - fastapi=0.119.1
  - uvicorn=0.35.0
  - starlette=0.47.3

  # 数据验证和序列化
  - pydantic=2.12.2
  - pydantic-core=2.41.4

  # 数据库和ORM
  - sqlalchemy=2.0.43

  # HTTP客户端和工具
  - httpx=0.28.1
  - httpcore=1.0.9
  - h11=0.16.0

  # 异步支持
  - anyio=4.10.0
  - greenlet=3.2.4

  # WebSocket支持
  - websockets=15.0.1

  # 表单数据处理
  - python-multipart=0.0.20

  # 配置管理
  - python-dotenv=1.1.1

  # JWT认证
  - pyjwt=2.10.1

  # 邮件验证
  - email-validator=2.3.0

  # 测试框架
  - pytest=8.4.2
  - iniconfig=2.1.0
  - pluggy=1.5.0

  # 开发工具
  - rich=14.2.0
  - typer=0.20.0
  - click=8.2.1
  - colorama=0.4.6

  # 类型支持
  - typing-extensions=4.15.0
  - annotated-types=0.6.0

  # 数据处理
  - pyyaml=6.0.3
  - markdown-it-py=4.0.0
  - mdurl=0.1.2

  # 网络和DNS
  - dnspython=2.7.0
  - idna=3.7

  # 包管理
  - pip=25.2
  - setuptools=80.9.0
  - wheel=0.45.1
  - packaging=25.0

  # 系统库（跨平台兼容）
  - ca-certificates=2025.10.5
  - certifi=2025.10.5
  - tzdata=2025b

  # redis
  - redis

  # 通过pip安装的包（跨平台兼容）
  - pip:
    - watchfiles==1.1.1
    - shellingham==1.5.4
    - rich-toolkit==0.15.1
