version: '3.8'

services:
  # ----------------------------------------------------
  # 1. 数据库服务 (MySQL)
  # ----------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: timecapsule_mysql
    restart: always
    ports:
      # ⚠️ 注意: 仅为本地调试暴露端口，生产环境通常不需要
      - "3306:3306"
    environment:
      # ❗ 必须与你的 .env 文件中的 DB_* 变量匹配
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD}  # 使用 DB_PASSWORD 作为 root 密码 (方便开发)
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      # 设置字符集，以支持中文等
      MYSQL_CHARSET: utf8mb4
      MYSQL_COLLATION: utf8mb4_unicode_ci
    volumes:
      # 数据持久化，防止容器删除后数据丢失
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ----------------------------------------------------
  # 2. 后端应用服务 (Python FastAPI/Uvicorn)
  # ----------------------------------------------------
  backend:
    build: .
    container_name: timecapsule_backend
    restart: always
    ports:
      # 将容器的 8000 端口映射到主机的 8000 端口
      - "8000:8000"
    environment:
      # 导入 .env 文件中的所有变量到容器环境
      # 在这里，DB_HOST 自动被设置为 'mysql' (服务名称)
      DB_HOST: mysql
    env_file:
      - .env
    volumes:
      # 挂载文件上传目录到主机 Downloads/uploads 文件夹
      - ./uploads:/app/uploads
      # 挂载整个项目代码，方便在开发过程中修改代码后容器自动重启 (热重载)
      - .:/app
    depends_on:
      # 确保 backend 在 mysql 数据库启动并健康检查通过后才启动
      mysql:
        condition: service_healthy
    # 容器启动时执行的命令 (这假设你的 Dockerfile 中没有 CMD 或 ENTRYPOINT)
    # 如果 Dockerfile 中已经定义，可以删除此行
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

# ----------------------------------------------------
# Docker 卷 (Volumes)
# ----------------------------------------------------
volumes:
  mysql-data: